<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fuel Pro Araraquara - PWA Oficial</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#16a34a">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #16a34a;
            --surface: #ffffff;
            --text: #1e293b;
            --bg-dim: rgba(15, 23, 42, 0.7);
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* --- BOTÕES FLUTUANTES (FABs) --- */
        .fab {
            position: absolute; z-index: 2000;
            background: white; border: none; color: var(--text);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
            border-radius: 18px; width: 56px; height: 56px; font-size: 24px; cursor: pointer;
        }
        
        .btn-gps-fix { 
            top: 20px; right: 20px; width: 52px; height: 52px; 
            border-radius: 14px; z-index: 4000 !important; 
            background: #ffffff; border: 2.1px solid var(--primary);
        }

        #ranking-fab { bottom: 20px; left: 20px; background: var(--primary); color: white; }
        #calc-fab    { bottom: 90px; left: 20px; }
        #car-fab     { bottom: 160px; left: 20px; }

        /* --- MODAIS E RANKING --- */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dim); backdrop-filter: blur(5px);
            z-index: 3000; display: none;
        }
        .modal-bubble {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 360px; background: white;
            z-index: 3100; border-radius: 28px; padding: 25px;
            display: none; flex-direction: column; box-sizing: border-box;
        }
        #ranking-bubble {
            position: absolute; bottom: 20px; left: 85px; width: 75%; max-width: 280px;
            background: white; z-index: 1999; border-radius: 20px;
            display: none; flex-direction: column; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .bubble-filters { display: flex; padding: 8px; gap: 4px; background: #f8fafc; border-bottom: 1px solid #eee; }
        .filter-btn { flex: 1; border: none; background: #e2e8f0; padding: 8px; border-radius: 8px; font-size: 10px; font-weight: bold; color: #64748b; }
        .filter-btn.active { background: var(--primary); color: white; }
        .ranking-item { padding: 12px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; font-size: 13px; }

        /* --- POPUP DO MAPA --- */
        .leaflet-popup-content-wrapper { width: 80vw; max-width: 300px; border-radius: 22px; padding: 10px; border: 2.5px solid var(--primary); }
        .badge-trust { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; margin: 8px 0; }
        .trust-high { background: #dcfce7; color: #166534; }
        .trust-low { background: #fee2e2; color: #991b1b; }
        .rating-stars { color: #fbbf24; font-size: 16px; margin-bottom: 5px; }
        
        .p-row { display: flex; justify-content: space-between; font-size: 17px; margin: 10px 0; }
        .p-row strong { color: var(--primary); }

        .btn-main { width: 100%; padding: 16px; border-radius: 15px; border: none; background: var(--primary); color: white; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn-edit-price { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; padding: 12px; border-radius: 12px; margin-top: 10px; font-size: 13px; font-weight: bold; }
        
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 18px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="modal-overlay" onclick="closeAll()"></div>

    <button class="fab btn-gps-fix" onclick="locateMe()">🎯</button>
    <button id="car-fab" class="fab" onclick="openModal('modal-car')">🚗</button>
    <button id="calc-fab" class="fab" onclick="openModal('modal-calc')">🧮</button>
    <button id="ranking-fab" class="fab" onclick="toggleRanking()">🏆</button>
    
    <div id="map"></div>

    <div id="ranking-bubble">
        <div class="bubble-filters">
            <button class="filter-btn active" onclick="setFuel('eth', this)">ETANOL</button>
            <button class="filter-btn" onclick="setFuel('gas', this)">GASOLINA</button>
        </div>
        <div id="ranking-list" style="max-height: 250px; overflow-y: auto;"></div>
    </div>

    <div id="modal-car" class="modal-bubble">
        <h2 style="text-align:center; margin:0 0 15px 0;">Meu Veículo 🚗</h2>
        <input type="number" id="cfg-eth" placeholder="Etanol (km/l)">
        <input type="number" id="cfg-gas" placeholder="Gasolina (km/l)">
        <button class="btn-main" onclick="saveSettings()">SALVAR</button>
    </div>

    <div id="modal-calc" class="modal-bubble">
        <h2 style="text-align:center; margin:0 0 15px 0;">Calculadora 🧮</h2>
        <input type="number" id="p-eth" placeholder="Etanol R$">
        <input type="number" id="p-gas" placeholder="Gasolina R$">
        <button class="btn-main" onclick="runSmartCalc()">CALCULAR</button>
        <div id="calc-res" style="margin-top:15px; text-align:center; font-weight:bold; color:var(--primary); font-size:18px;"></div>
    </div>

    <div id="modal-edit" class="modal-bubble">
        <h2 id="edit-title" style="margin:0; font-size:18px; text-align:center;">Atualizar Preço</h2>
        <p id="gps-status" style="font-size:11px; color:var(--danger); text-align:center; margin-bottom:10px; font-weight:bold;">Validando GPS...</p>
        <input type="number" id="new-eth" step="0.01" placeholder="Etanol R$">
        <input type="number" id="new-gas" step="0.01" placeholder="Gasolina R$">
        <button class="btn-main" id="btn-save-price" onclick="confirmUpdate()">SALVAR NOVO PREÇO</button>
        <button onclick="closeAll()" style="background:none; border:none; color:#999; margin-top:10px; width:100%;">Sair</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false}).setView([-21.7850, -48.1750], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let currentStation = null, userPos = null, currentFuel = 'eth';

        const postos = [
            { id: 1, nome: "Posto Shell - Bento de Abreu", lat: -21.7836, lng: -48.1755, gas: 5.69, eth: 3.39, nota: 4.8, verificado: true },
            { id: 2, nome: "Posto Ipiranga - Via Expressa", lat: -21.7945, lng: -48.1682, gas: 5.55, eth: 3.25, nota: 4.5, verificado: true },
            { id: 3, nome: "Posto BR - Vila Xavier", lat: -21.7982, lng: -48.1610, gas: 5.75, eth: 3.45, nota: 4.2, verificado: true },
            { id: 4, nome: "Posto Shell - Alameda", lat: -21.7712, lng: -48.1825, gas: 5.65, eth: 3.35, nota: 4.7, verificado: true },
            { id: 5, nome: "Posto Monte Carlo", lat: -21.7655, lng: -48.1688, gas: 5.59, eth: 3.29, nota: 4.6, verificado: true },
            { id: 6, nome: "Posto Jd. das Estações", lat: -21.8050, lng: -48.1550, gas: 5.49, eth: 3.19, nota: 3.2, verificado: false },
            { id: 7, nome: "Posto Extra", lat: -21.7890, lng: -48.1590, gas: 5.52, eth: 3.22, nota: 4.0, verificado: true },
            { id: 8, nome: "Posto Graal - Rodovia", lat: -21.8250, lng: -48.1880, gas: 5.99, eth: 3.69, nota: 4.9, verificado: true }
        ];

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function renderMarkers() {
            map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
            postos.forEach(p => {
                const trust = p.verificado ? `<span class="badge-trust trust-high">✓ Verificado ANP</span>` : `<span class="badge-trust trust-low">⚠ Sem Selo</span>`;
                const marker = L.marker([p.lat, p.lng]).addTo(map);
                const content = `
                    <div class="popup-info">
                        <h4 style="margin:0;">${p.nome}</h4>
                        ${trust}
                        <div class="rating-stars">★ ${p.nota}</div>
                        <div class="p-row">Etanol: <strong>R$ ${p.eth.toFixed(2)}</strong></div>
                        <div class="p-row">Gasolina: <strong>R$ ${p.gas.toFixed(2)}</strong></div>
                        <button class="btn-main" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}')">ABRIR ROTA</button>
                        <button class="btn-edit-price" onclick="openEdit(${p.id})">✎ ATUALIZAR PREÇO</button>
                    </div>
                `;
                marker.bindPopup(content, { minWidth: 260 });
            });
        }

        function openModal(id) { document.getElementById('modal-overlay').style.display = 'block'; document.getElementById(id).style.display = 'flex'; }
        
        function closeAll() { 
            document.querySelectorAll('.modal-bubble').forEach(m => m.style.display = 'none'); 
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('ranking-bubble').style.display = 'none';
        }
        
        function openEdit(id) {
            currentStation = postos.find(p => p.id === id);
            document.getElementById('edit-title').innerText = currentStation.nome;
            document.getElementById('new-eth').value = currentStation.eth;
            document.getElementById('new-gas').value = currentStation.gas;
            locateMe(); openModal('modal-edit'); checkGpsStatus();
        }

        function checkGpsStatus() {
            const s = document.getElementById('gps-status'), b = document.getElementById('btn-save-price');
            if(!userPos) { s.innerText = "⚠️ Aguardando GPS..."; s.style.color = "var(--danger)"; b.disabled = true; b.style.opacity = "0.5"; }
            else { s.innerText = "✅ GPS Validado."; s.style.color = "var(--primary)"; b.disabled = false; b.style.opacity = "1"; }
        }

        function confirmUpdate() {
            const eth = parseFloat(document.getElementById('new-eth').value), gas = parseFloat(document.getElementById('new-gas').value);
            const dist = getDistance(userPos.lat, userPos.lng, currentStation.lat, currentStation.lng);
            if(dist > 150) { alert("❌ GPS BLOQUEADO: Você está longe do posto!"); return; }
            if(eth < 2.20 || eth > 5.50) { alert("❌ VALOR SUSPEITO!"); return; }
            currentStation.eth = eth; currentStation.gas = gas; renderMarkers(); closeAll(); alert("✅ Sucesso!");
        }

        function saveSettings() {
            localStorage.setItem('avg_eth', document.getElementById('cfg-eth').value);
            localStorage.setItem('avg_gas', document.getElementById('cfg-gas').value);
            closeAll();
        }

        function runSmartCalc() {
            const pe = parseFloat(document.getElementById('p-eth').value), pg = parseFloat(document.getElementById('p-gas').value);
            const me = parseFloat(localStorage.getItem('avg_eth')) || 7.5, mg = parseFloat(localStorage.getItem('avg_gas')) || 10.5;
            if(pe && pg) document.getElementById('calc-res').innerText = pe/me < pg/mg ? "🌿 Vá de ETANOL!" : "⛽ Vá de GASOLINA!";
        }

        function toggleRanking() {
            const b = document.getElementById('ranking-bubble');
            b.style.display = (b.style.display === 'flex') ? 'none' : 'flex';
            if(b.style.display === 'flex') updateRanking();
        }

        function updateRanking() {
            const list = document.getElementById('ranking-list');
            list.innerHTML = '';
            const sorted = [...postos].sort((a, b) => a[currentFuel] - b[currentFuel]);
            sorted.forEach(p => {
                const item = document.createElement('div');
                item.className = 'ranking-item';
                item.innerHTML = `<span>${p.nome.split('-')[0]}</span><strong>R$ ${p[currentFuel].toFixed(2)}</strong>`;
                item.onclick = () => { map.flyTo([p.lat, p.lng], 16); toggleRanking(); };
                list.appendChild(item);
            });
        }

        function setFuel(fuel, btn) {
            currentFuel = fuel;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateRanking();
        }

        function locateMe() { map.locate({setView: true, maxZoom: 16}); }
        map.on('locationfound', (e) => {
            userPos = e.latlng;
            L.circleMarker(e.latlng, {radius: 8, color: '#16a34a', fillColor: '#16a34a', fillOpacity: 0.8}).addTo(map);
            if(document.getElementById('modal-edit').style.display === 'flex') checkGpsStatus();
        });

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        renderMarkers();
        document.getElementById('cfg-eth').value = localStorage.getItem('avg_eth') || 7.5;
        document.getElementById('cfg-gas').value = localStorage.getItem('avg_gas') || 10.5;
    </script>
</body>
</html>
